<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <form id="form">
      <p id="form-title">Sign up</p>
      <div class="field">
        <label>Name:</label>
        <input type="text" id="name" />
        <p class="valid-annotation hidden">&#10004;</p>
        <p class="input-error error" id="name-error"></p>
      </div>
      <div class="field">
        <label>E-mail:</label>
        <input type="email" id="email" />
        <p class="valid-annotation hidden">&#10004;</p>
        <p class="input-error error" id="email-error"></p>
      </div>
      <div class="field">
        <label>Password:</label>
        <input type="password" id="password" />
        <button type="button" class="password-visibility-btn">
          <i class="fa fa-eye-slash"></i>
        </button>
        <p class="valid-annotation hidden">&#10004;</p>
        <p class="input-error error" id="password-error"></p>
        <p id="password-strength-indicator" class="hidden"></p>
      </div>
      <div class="field">
        <label>Confirm Password:</label>
        <input type="password" id="confirm-password" />
        <button type="button" class="password-visibility-btn">
          <i class="fa fa-eye-slash"></i>
        </button>
        <p class="valid-annotation hidden">&#10004;</p>
        <p class="input-error error" id="confirm-password-error"></p>
      </div>
      <button type="submit" id="submit-btn">Submit</button>
    </form>
    <p id="result"></p>

    <script src="script.js"></script>
  </body>
</html>
