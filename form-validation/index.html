<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="form">
        <p id="form-title">Sign up</p>
      <div class="field">
        <label>Name:</label>
        <input type="text" id="" />
        <p class="error"></p>
      </div>
      <div class="field">
        <label>E-mail:</label>
        <input type="email" id="" />
        <p class="error"></p>
      </div>
      <div class="field">
        <label>Password:</label>
        <input type="password" id="" />
        <p class="error"></p>
      </div>
      <div class="field">
        <label>Confirm Password:</label>
        <input type="password" id="" />
        <p class="error"></p>
      </div>
      <button type="submit">Submit</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
