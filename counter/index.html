<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p id="counter-label">0</p>
    <div id="btns-container">
      <div id="counter-value-btns-container">
        <button id="decrease-btn">-</button>
        <button id="increase-btn">+</button>
      </div>
      <div id="functional-btns-container">
        <button id="reset-btn" class="functional-btn">Reset</button>
        <button id="save-btn" class="functional-btn">Save</button>
        <button id="load-btn" class="functional-btn">Load</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
